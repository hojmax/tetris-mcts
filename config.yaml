network:
  trunk_channels: 32
  num_conv_residual_blocks: 5
  reduction_channels: 32
  board_stats_hidden: 32
  board_proj_hidden: 512
  fc_hidden: 256
  aux_hidden: 128
  num_aux_hidden_layers: 1
  fusion_hidden: 256
  num_fusion_blocks: 1
  conv_kernel_size: 3
  conv_padding: 1
optimizer:
  total_steps: 100000000000
  batch_size: 2048
  learning_rate: 0.0005
  weight_decay: 0.00005
  grad_clip_norm: 10.0
  lr_schedule: linear
  lr_decay_steps: 200000
  lr_min_factor: 0.2
  lr_step_gamma: 0.1
  lr_step_divisor: 3
  value_loss_weight_window: 2000
  policy_loss_scale: 10.0
  ema_decay: 0.999
  use_torch_compile: true
  train_step_metrics_interval: 16
  compute_extra_train_metrics_on_log: true
  mirror_augmentation_probability: 0.5
  log_individual_games_to_wandb: false
self_play:
  num_simulations: 2000
  c_puct: 1.5
  temperature: 1.0
  dirichlet_alpha: 0.02
  dirichlet_epsilon: 0.25
  add_noise: true
  nn_value_weight: 0.01
  nn_value_weight_promotion_multiplier: 1.4
  nn_value_weight_promotion_max_delta: 0.1
  nn_value_weight_cap: 1.0
  use_parent_value_for_unvisited_q: true
  visit_sampling_epsilon: 0.2
  mcts_seed: 0
  reuse_tree: true
  num_workers: 32
  max_placements: 50
  death_penalty: 10.0
  overhang_penalty_weight: 10.0
  # Schedule for ramping `death_penalty` and `overhang_penalty_weight` down.
  # `gated`: scale 1 below `nn_value_weight_cap`, 0 at/above (legacy behavior).
  # `constant_then_linear`: scale 1 for the first `hold_games` cumulative
  #   completed games, linearly decays to 0 over `decay_games`, then 0.
  #   Independent of `nn_value_weight`. Example: hold for 40k games then
  #   ramp down over the next 10k:
  #     strategy: constant_then_linear
  #     hold_games: 40000
  #     decay_games: 10000
  penalty_schedule:
    strategy: constant_then_linear
    hold_games: 50000
    decay_games: 10000
  # Schedule for advancing `nn_value_weight` toward `nn_value_weight_cap`.
  # Ramp shape (multiplicative + max_delta + cap) is unchanged; only the
  # trigger differs.
  # `per_promotion`: legacy. One tick per promotion (gating) or per direct
  #   sync (no-gating); ramp stalls without those events.
  # `per_games_interval`: one tick every `games_interval` cumulative games,
  #   re-derived deterministically from the configured `nn_value_weight`.
  #   Example: ramp every 500 games:
  #     strategy: per_games_interval
  #     games_interval: 500
  nn_value_weight_schedule:
    strategy: per_games_interval
    games_interval: 500
  use_candidate_gating: false
  model_promotion_eval_games: 20
  bootstrap_without_network: true
  bootstrap_num_simulations: 4000
  save_eval_trees: false
replay:
  buffer_size: 3250000
  min_buffer_size: 10000
  prefetch_batches: 1
  staged_batch_cache_batches: 1
  mirror_replay_on_accelerator: true
  replay_mirror_refresh_seconds: 10.0
  replay_mirror_delta_chunk_examples: 65536
  pin_memory_batches: true
run:
  project_name: tetris-alphazero
  run_name: null
  model_sync_interval_seconds: 120.0
  model_sync_failure_backoff_seconds: 120.0
  model_sync_max_interval_seconds: 0.0
  checkpoint_interval_seconds: 10800.0
  log_interval_seconds: 10.0
  save_interval_seconds: 10800.0
  run_dir: null
  checkpoint_dir: null
  data_dir: null
r2_sync:
    enabled: true
    bucket: tetris-mcts-runs
    prefix: tetris-mcts
    # sync_run_id: optional override; when omitted the trainer uses the local
    # run_dir.name (an `<adjective>-<animal>-<timestamp>` id) and generators
    # auto-discover the most recent active run.